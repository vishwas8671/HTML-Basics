<!DOCTYPE html>
<html lang="en">
    <title>cCss Grid</title>
    <head>
        <style>
            *{
                margin: 0;
                padding: 0;;
            }
            body{
                height: 100vh;
                width: 100vw;

            }
            .container{
                height: 100%;
                width:100%;
                background-color: rgb(80, 89, 86);
                display: grid;
                padding: 3.5rem;
                gap: 0.7rem;
                column-gap: 20px;
              /*  grid-template-rows: 1fr 1fr;*/
              grid-template-rows: repeat(4,1fr);
               /* grid-template-columns: 1fr 1fr 1fr;*/
               grid-template-columns: repeat(3,1fr);
            }
            .item{
                background-color: rgb(6, 177, 177);
                border: 4px solid black;
                margin: 10px;
                display: flex;
                justify-content: center;
                align-items: center;
                font-size: larger;
                font-weight: bolder;
            }
            
          @media(min-width:760px){
            .header,.footer{
                grid-column-start: 1;
                grid-column-end: 4;
            }
            .sidebar{
                grid-row-start: 2;
                grid-row-end: 4;
            }
            .contentbar{
                grid-column-start:2 ;
                grid-column-end: 4;
            }
          }
        </style>

    </head>
    <body>
       <div class="container">
        <div class="item header">item1</div>
        <div class="item sidebar">item2</div>
        <div class="item contentbar">item3</div>
        <div class="item">item4</div>
        <div class="item">item5</div>
        <div class="item footer">item6</div>
       </div>
    </body>
</html>
